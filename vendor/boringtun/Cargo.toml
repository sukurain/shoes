[package]
edition = "2018"
name = "boringtun"
version = "0.6.0"
authors = [
    "Noah Kennedy <nkennedy@cloudflare.com>",
    "Andy Grover <agrover@cloudflare.com>",
    "Jeff Hiner <jhiner@cloudflare.com>",
]
description = "an implementation of the WireGuard® protocol designed for portability and speed"
documentation = "https://docs.rs/boringtun/0.5.2/boringtun/"
license = "BSD-3-Clause"
repository = "https://github.com/cloudflare/boringtun"

[lib]
crate-type = [
    "staticlib",
    "cdylib",
    "rlib",
]

[[bench]]
name = "crypto_benches"
harness = false

[dependencies.aead]
version = "0.5.0-pre.2"

[dependencies.base64]
version = "0.13"

[dependencies.blake2]
version = "0.10"

[dependencies.chacha20poly1305]
version = "0.10.0-pre.1"

[dependencies.hex]
version = "0.4"

[dependencies.hmac]
version = "0.12"

[dependencies.ip_network]
version = "0.4.1"

[dependencies.ip_network_table]
version = "0.2.0"

[dependencies.jni]
version = "0.19.0"
optional = true

[dependencies.libc]
version = "0.2"

[dependencies.mock_instant]
version = "0.2"
optional = true

[dependencies.parking_lot]
version = "0.12"

[dependencies.rand_core]
version = "0.6.3"
features = ["getrandom"]

[dependencies.ring]
version = "0.16"

[dependencies.socket2]
version = "0.4.7"
features = ["all"]
optional = true

[dependencies.thiserror]
version = "1"
optional = true

[dependencies.tracing]
version = "0.1.29"

[dependencies.tracing-subscriber]
version = "0.3"
features = ["fmt"]
optional = true

[dependencies.untrusted]
version = "0.9.0"

[dependencies.x25519-dalek]
version = "=2.0.0-rc.3"
features = [
    "reusable_secrets",
    "static_secrets",
]

[dev-dependencies.criterion]
version = "0.3.5"
features = ["html_reports"]

[dev-dependencies.etherparse]
version = "0.12"

[dev-dependencies.tracing-subscriber]
version = "0.3"

[features]
default = []
device = [
    "socket2",
    "thiserror",
]
ffi-bindings = ["tracing-subscriber"]
jni-bindings = [
    "ffi-bindings",
    "jni",
]
mock-instant = ["mock_instant"]

[target."cfg(unix)".dependencies.nix]
version = "0.25"
features = [
    "time",
    "user",
]
default-features = false
