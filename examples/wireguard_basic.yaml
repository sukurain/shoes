# WireGuard outbound example using a standard WireGuard peer.
#
# Replace private-key, public-key, server, ip, and ipv6 with values from your own
# WireGuard profile. WARP reserved/client id bytes are not supported.

- client_group: wireguard
  client_proxies:
    - protocol:
        type: wireguard
        private-key: "YOUR_BASE64_PRIVATE_KEY"
        server: 203.0.113.10
        port: 51820
        ip: 10.8.0.2
        ipv6: 2001:db8:100::2
        public-key: "PEER_BASE64_PUBLIC_KEY"
        allowed-ips: ["0.0.0.0/0", "::/0"]
        udp: true
        mtu: 1408
        ip-version: ipv6-prefer
        remote-dns-resolve: true
        dns: ["2001:4860:4860::8888"]
- rule_group: wireguard-rules
  rules:
    # Route selected hostnames through WireGuard.
    - masks:
        - "youtube.com"
        - "googlevideo.com"
        - "cloudflare.com"
      action: allow
      client_chain: wireguard

    # Everything else goes out directly.
    - masks: ["0.0.0.0/0", "::/0"]
      action: allow
      client_chain:
        protocol:
          type: direct

# Local SOCKS5 proxy that applies the rules above.
- address: 127.0.0.1:1080
  protocol:
    type: socks
    udp_enabled: true
  rules: wireguard-rules
