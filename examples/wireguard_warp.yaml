# WireGuard outbound example using a Cloudflare WARP-style peer.
#
# Replace private-key, ip, ipv6, and reserved with values from your own
# WireGuard/WARP profile. The public key below is Cloudflare WARP's common peer
# public key.

- client_group: warp
  client_proxies:
    - protocol:
        type: wireguard
        private-key: "YOUR_BASE64_PRIVATE_KEY"
        server: 162.159.193.5
        port: 4500
        ip: 172.16.0.2
        ipv6: 2606:4700:cf1:1000::1
        public-key: "bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo="
        allowed-ips: ["0.0.0.0/0", "::/0"]
        udp: true
        mtu: 1408
        ip-version: ipv6-prefer
        remote-dns-resolve: true
        dns: ["2606:4700:4700::1111"]
        # Optional WARP client id. Keep this as exactly three bytes when used.
        # reserved: [0, 0, 0]

- rule_group: warp-rules
  rules:
    # Route selected hostnames through WireGuard.
    - masks:
        - "youtube.com"
        - "googlevideo.com"
        - "cloudflare.com"
      action: allow
      client_chain: warp

    # Everything else goes out directly.
    - masks: ["0.0.0.0/0", "::/0"]
      action: allow
      client_chain:
        protocol:
          type: direct

# Local SOCKS5 proxy that applies the rules above.
- address: 127.0.0.1:1080
  protocol:
    type: socks
    udp_enabled: true
  rules: warp-rules
